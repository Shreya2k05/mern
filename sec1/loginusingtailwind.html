<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="flex justify-center items-center  h-screen bg-gray-100 background-image:url('https://images.pexels.com/photos/8236113/pexels-photo-8236113.jpeg')">
     <div class=" w-1/5 p-8 rounded-xl shadow-xl bg-white">
        <h3 class="text-center font-bold text-2xl my-5">Login Form</h3>

        <form>
            <label for="">Email Address</label>
            <input class="w-full border rounded-md px-4 py-2 mb-6" type="email">

            <label for="">Password</label>
            <input class="w-full border rounded-md px-4 py-2 mb-6" type="password">
            <br>
            <a href="#" class="text-blue-500 text-sm my-3">Forgot Password?</a>

            <button class="bg-blue-500 text-white px-4 py-2 w-full rounded-md">Submit</button>

            <a href="#" class="block text-blue-500 text-sm my-3 text-center font-semibold">Not registered yet? Sign Up</a>
        </form>

    
  </body>
</html>

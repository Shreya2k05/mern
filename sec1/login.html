<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

   <link href="https://fonts.googleapis.com/css?family=Roboto:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic" rel="stylesheet" />

    <style>

        *{font-family: Roboto;

        }

        .card{
            /*border: 2px solid paleturquoise;*/
            width: 20%;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 3px 3px 5px 0px rgba(0, 0, 0, 0.537);
            background-color: white;

        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
           /* background-color: rgb(255,182,193);*/
            /*background-image: linear-gradient(0deg, rgb(203, 70, 70),pink,white);*/
            background-image: url(https://images.pexels.com/photos/8236113/pexels-photo-8236113.jpeg);
            /*background-image: linear-gradient(0deg, rgb(203, 70, 70),pink,white),
            url(https://images.pexels.com/photos/8236113/pexels-photo-8236113.jpeg);*/
            background-size: cover;
            background-position: bottom;
            backdrop-filter: saturate(100%);
        }

        .text-input{
            display: block;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 5px;
            border: 5px solid black
        }

        .btn-submit{
            color: white;
            background-color: rgb(23, 23, 154);
            border-radius: 5px;
            align-items: center;
            padding: 10px;
            width: 100%;
            border: none;
        }

        .link{display: block;
              text-decoration: none;
              color: blue;
            }
            
         .forget-link{
            margin-bottom: 20px;
         }

         .signup-link{
            margin: 20px 0;
            text-align: center;
         }
           
        h3{
            text-align: center;
        }
       


    

    </style>
</head>
<body>
    <div class="card">
        <h3 class="form-title">Login Form</h3>

        <form>
            <label for="">Email Address</label>
            <input class="text-input" type="email">

            <label for="">Password</label>
            <input class="text-input" type="password">
            <br>
            <a href="#" class="link forget-link">Forgot Password? </a>

            <button class="btn-submit">Submit</button>

            <a href="#" class="link signup-link">Not registered yet? Sign Up</a>
        </form>

       
        


    </div>
</body>
</html>
